name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. new pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      # typecheck + lint + tests (tests use in-memory Postgres, so no DB needed).
      - run: npm run check

      # Verify the production build compiles (what Render runs on deploy).
      - run: npm run build

      # Fail if schema.ts has changes not captured in a committed migration
      # (i.e. someone edited the schema but forgot `npm run db:generate`).
      # generate runs offline from the schema + migration snapshots; the dummy
      # DATABASE_URL only satisfies drizzle.config.ts — it never connects.
      - name: Check migrations are up to date
        env:
          DATABASE_URL: postgres://unused
        run: |
          npm run db:generate
          if [ -n "$(git status --porcelain db/migrations)" ]; then
            echo "::error::schema.ts has uncommitted migration changes. Run 'npm run db:generate' and commit db/migrations/."
            git status --porcelain db/migrations
            git --no-pager diff -- db/migrations
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    # Run in the same Playwright image used locally (npm run e2e), so visual
    # snapshot baselines render identically here and on developer machines.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: fridge
          POSTGRES_PASSWORD: fridge
          POSTGRES_DB: fridge_test
        options: >-
          --health-cmd "pg_isready -U fridge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - run: npm ci

      # DB host/credentials come from .env.test (host `postgres` = the service).
      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
