name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. new pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      # typecheck + lint + tests (tests use in-memory Postgres, so no DB needed).
      - run: npm run check

      # Verify the production build compiles (what Render runs on deploy).
      - run: npm run build
