services:
  - type: web
    name: fridge
    runtime: node
    plan: free
    # devDependencies (typescript, tsc-alias) are needed at build time, so force
    # their install even though Render sets NODE_ENV=production.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      # Node version comes from .node-version (Render reads it automatically).
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fridge-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      # Admin credentials are set in the Render dashboard (not stored here). The
      # admin user is (re)seeded from these on every startup.
      - key: SEED_ADMIN_NAME
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false

databases:
  - name: fridge-db
    plan: free
