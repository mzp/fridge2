services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: fridge
      POSTGRES_PASSWORD: fridge
      POSTGRES_DB: fridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fridge -d fridge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
